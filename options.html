<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Gemini Özetleyici - Ayarlar</title>
  <link rel="stylesheet" href="assets/options.css"/>
</head>
<body class="page-options">
  <main class="settings-page">
    <h3 class="settings-title">Gemini Özetleyici Ayarları</h3>

    <div class="settings-field">
      <label class="settings-label" for="apikey">API Key (Google AI Studio):</label>
      <input id="apikey" class="settings-control" placeholder="AIza..." />
      <div class="settings-hint">Not: Sadece API key girmeniz yeterli.</div>
    </div>

    <div class="settings-field">
      <label class="settings-label" for="model">Model:</label>
      <select id="model" class="settings-control">
        <option value="">Otomatik (önerilen)</option>
      </select>
      <div id="modelStatus" class="settings-hint"></div>
    </div>

    <div class="settings-field">
      <label class="settings-label" for="language">Özet Dili:</label>
      <input id="language" class="settings-control" value="Türkçe" />
    </div>

    <div class="settings-field">
      <label class="settings-label" for="summaryFormat">Özet Formatı:</label>
      <select id="summaryFormat" class="settings-control">
        <option value="summary">Özet</option>
        <option value="detailed">Detaylı Özet</option>
      </select>
    </div>

    <h3 class="settings-section-title">Görünüm</h3>

    <div class="settings-field">
      <label class="settings-label" for="drawerFontSize">Drawer yazı boyutu (px):</label>
      <input id="drawerFontSize" class="settings-control" type="number" min="12" max="22" step="1" placeholder="15" />
    </div>

    <div class="settings-field">
      <label class="settings-label" for="drawerWidth">Drawer genişliği (px):</label>
      <input id="drawerWidth" class="settings-control" type="number" min="320" max="1440" step="10" placeholder="440" />
      <div class="settings-hint settings-hint-tight">Not: Drawer’ı soldaki tutamaktan sürükleyerek de genişletebilirsiniz.</div>
    </div>

    <button id="save" class="settings-action-btn">Kaydet</button>
    <div id="status" class="settings-status"></div>
  </main>
  <script src="options.js"></script>
</body>
</html>
